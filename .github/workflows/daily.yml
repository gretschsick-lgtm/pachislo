name: 🎰 パチンコBot 毎日自動投稿

on:
  schedule:
    - cron: "0 12 * * *"   # 21時 JST（明日のイベント予告）
    - cron: "0 14 * * *"   # 23時 JST（今日のアツかった結果）
  workflow_dispatch:

jobs:
  tokyo-yokoku:
    if: github.event.schedule == '0 12 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: data/events.db
          key: pachinko-db-tokyo-${{ github.run_number }}
          restore-keys: pachinko-db-tokyo-
      - name: DBリセット
        run: rm -f data/events.db
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - run: sudo apt-get install -y fonts-ipafont-gothic -q
      - name: Bot実行（東京・予告）
        env:
          ANTHROPIC_API_KEY:     ${{ secrets.ANTHROPIC_API_KEY }}
          X_API_KEY:             ${{ secrets.X_API_KEY }}
          X_API_SECRET:          ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN:        ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          X_BEARER_TOKEN:        ${{ secrets.X_BEARER_TOKEN }}
          PREFECTURE_CODE: "13"
          PREFECTURE_HINT: "東京"
          SCRAPE_PAGES: "5"
          DRY_RUN: "false"
          POST_TYPE: "yokoku"
        run: python run.py
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bot-data-tokyo-yokoku-${{ github.run_number }}
          path: data/
          retention-days: 90

  kanagawa-yokoku:
