name: 🎰 パチンコBot 毎日自動投稿

on:
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch:

jobs:
  tokyo:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: data/events.db
          key: pachinko-db-tokyo-${{ github.run_number }}
          restore-keys: pachinko-db-tokyo-
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - run: sudo apt-get install -y fonts-ipafont-gothic -q
      - name: Bot実行（東京）
        env:
          ANTHROPIC_API_KEY:     ${{ secrets.ANTHROPIC_API_KEY }}
          X_API_KEY:             ${{ secrets.X_API_KEY }}
          X_API_SECRET:          ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN:        ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          X_BEARER_TOKEN:        ${{ secrets.X_BEARER_TOKEN }}
          PREFECTURE_CODE: "13"
          PREFECTURE_HINT: "東京"
          SCRAPE_PAGES: "5"
          DRY_RUN: "false"
        run: python run.py
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bot-data-tokyo-${{ github.run_number }}
          path: data/
          retention-days: 90

  kanagawa:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: data/events.db
          key: pachinko-db-kanagawa-${{ github.run_number }}
          restore-keys: pachinko-db-kanagawa-
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - run: sudo apt-get install -y fonts-ipafont-gothic -q
      - name: Bot実行（神奈川）
        env:
          ANTHROPIC_API_KEY:     ${{ secrets.ANTHROPIC_API_KEY }}
          X_API_KEY:             ${{ secrets.X_API_KEY }}
          X_API_SECRET:          ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN:        ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          X_BEARER_TOKEN:        ${{ secrets.X_BEARER_TOKEN }}
          PREFECTURE_CODE: "14"
          PREFECTURE_HINT: "神奈川"
          SCRAPE_PAGES: "5"
          DRY_RUN: "false"
        run: python run.py
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bot-data-kanagawa-${{ github.run_number }}
          path: data/
          retention-days: 90

  saitama:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: data/events.db
          key: pachinko-db-saitama-${{ github.run_number }}
          restore-keys: pachinko-db-saitama-
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - run: sudo apt-get install -y fonts-ipafont-gothic -q
      - name: Bot実行（埼玉）
        env:
          ANTHROPIC_API_KEY:     ${{ secrets.ANTHROPIC_API_KEY }}
          X_API_KEY:             ${{ secrets.X_API_KEY }}
          X_API_SECRET:          ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN:        ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          X_BEARER_TOKEN:        ${{ secrets.X_BEARER_TOKEN }}
          PREFECTURE_CODE: "11"
          PREFECTURE_HINT: "埼玉"
          SCRAPE_PAGES: "5"
          DRY_RUN: "false"
        run: python run.py
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bot-data-saitama-${{ github.run_number }}
          path: data/
          retention-days: 90
