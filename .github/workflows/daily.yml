name: daily-post

on:
  schedule:
    - cron: '0 12 * * *'   # 毎日21時JST（予告）
  workflow_dispatch:
    inputs:
      post_type:
        description: 'POST_TYPE'
        default: 'yokoku'

jobs:
  tokyo-yokoku:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      - run: pip install tweepy anthropic requests lxml beautifulsoup4 Pillow
      - run: python run.py
        env:
          PYTHONUNBUFFERED: "1"
          PREF_CODE: "13"
          PREF_HINT: "東京"
          POST_TYPE: "yokoku"
          DRY_RUN: "false"
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}

  kanagawa-yokoku:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      - run: pip install tweepy anthropic requests lxml beautifulsoup4 Pillow
      - run: python run.py
        env:
          PYTHONUNBUFFERED: "1"
          PREF_CODE: "14"
          PREF_HINT: "神奈川"
          POST_TYPE: "yokoku"
          DRY_RUN: "false"
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}

  saitama-yokoku:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      - run: pip install tweepy anthropic requests lxml beautifulsoup4 Pillow
      - run: python run.py
        env:
          PYTHONUNBUFFERED: "1"
          PREF_CODE: "11"
          PREF_HINT: "埼玉"
          POST_TYPE: "yokoku"
          DRY_RUN: "false"
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
